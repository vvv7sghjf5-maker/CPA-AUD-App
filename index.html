<!doctype html><html lang='en'><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>CPA AUD Study App v7.7 QA</title><link rel='manifest' href='./manifest.json'><style>
:root{--bg:#0f172a;--card:#111827;--text:#e5e7eb;--muted:#9ca3af;--accent:#38bdf8;--ok:#22c55e;--warn:#f59e0b;--bad:#ef4444}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:var(--bg);color:var(--text)}header{padding:16px;background:#020617;position:sticky;top:0;z-index:2}h1{margin:0;font-size:1.25rem}.muted{color:var(--muted)}main{padding:14px;max-width:1180px;margin:auto}.card{background:var(--card);border:1px solid #374151;border-radius:16px;padding:14px;margin:12px 0}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}.actions{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}button,input,textarea,select{font:inherit;border-radius:10px;border:1px solid #475569;padding:10px;background:#1f2937;color:var(--text)}button{cursor:pointer}.primary{background:#0369a1;border-color:#0284c7}.ok{background:#166534}.warn{background:#92400e}.danger{background:#7f1d1d}.pill{display:inline-block;background:#1e293b;border:1px solid #475569;border-radius:999px;padding:4px 8px;margin:2px}.hide{display:none}.choice{display:block;width:100%;text-align:left;margin:8px 0}.correct{border-color:var(--ok)}.wrong{border-color:var(--bad)}.bar{height:10px;background:#334155;border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:var(--accent)}textarea{width:100%;min-height:90px}.metric{font-size:2rem;font-weight:700}nav button.active,.section.active{outline:2px solid var(--accent)}table{width:100%;border-collapse:collapse}td,th{border-bottom:1px solid #334155;padding:8px;text-align:left}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.day{min-height:95px;background:#0b1220;border:1px solid #334155;border-radius:10px;padding:6px}.small{font-size:.85rem}.examItem{border:1px solid #334155;border-radius:12px;padding:12px;margin:8px 0}
