function $(id){return document.getElementById(id)}
function loadState(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}')}catch(e){return {}}}
let state=loadState();
state.section=SECTIONS.some(s=>s.id===state.section)?state.section:'ethics';state.scores=state.scores||{};state.flash=state.flash||{};state.notes=state.notes||'';state.sim=state.sim||{};state.bookmarks=state.bookmarks||[];state.plan=state.plan||{};state.quizSeed=state.quizSeed||{};state.quizLimit=Number(state.quizLimit||20);state.currentQuiz=state.currentQuiz||{};state.simLimit=Number(state.simLimit||1);state.simSeed=state.simSeed||{};state.currentSims=state.currentSims||{};
function save(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}
function activeView(){return document.querySelector('.view:not(.hide)')?.id||'dashboard'}
function setView(v){document.querySelectorAll('.view').forEach(x=>x.classList.add('hide'));$(v).classList.remove('hide');$('title').textContent=v[0].toUpperCase()+v.slice(1);document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.v===v));render(v)}
function setSection(id){state.section=id;save();render(activeView())}
function renderNav(){const nav=$('nav');nav.innerHTML='';['dashboard','readings','quiz','flashcards','sims','planner','exam','notes'].forEach(v=>{let b=document.createElement('button');b.type='button';b.textContent=v.replace('sims','simulations').replace(/^./,c=>c.toUpperCase());b.dataset.v=v;b.onclick=()=>setView(v);nav.appendChild(b)})}
function renderSectionBtns(){const wrap=$('sectionBtns');wrap.innerHTML='';SECTIONS.forEach(s=>{let b=document.createElement('button');b.type='button';b.className='sectionBtn '+(state.section===s.id?'active':'');b.textContent=s.name.split(': ')[1];b.onclick=()=>setSection(s.id);wrap.appendChild(b)});$('activeArea').textContent=SECTIONS.find(s=>s.id===state.section).weight}
function areaQs(sec=state.section){return QUESTIONS.filter(q=>q.sec===sec)}
function simReadiness(sec=state.section){let vals=Object.values(state.sim[sec]||{}).map(x=>Number(x.score||0));return vals.length?Math.round(vals.reduce((a,b)=>a+b,0)/vals.length):0}
function areaSims(sec=state.section){return SIMS[sec]||[]}
function readiness(sec){let qs=areaQs(sec),done=qs.filter(q=>state.scores[q.id]);let pct=done.length?Math.round(done.reduce((a,q)=>a+(state.scores[q.id].correct?1:0),0)/done.length*100):0;let fl=FLASH.filter(f=>f.sec===sec);let mastered=fl.filter(f=>state.flash[f.id]==='mastered').length;return Math.round(pct*.65+(mastered/fl.length*100)*.2+simReadiness(sec)*.15)}
function render(v){renderSectionBtns(); if(v==='dashboard')dashboard(); if(v==='readings')readings(); if(v==='quiz')quizSetup(); if(v==='flashcards')cards(); if(v==='sims')sims(); if(v==='planner')planner(); if(v==='exam')exam(); if(v==='notes')notes();}
function dashboard(){$('today').textContent=new Date().toLocaleDateString();$('dashboard').innerHTML=`<div class="grid">${SECTIONS.map(s=>`<div class="card"><b>${s.name}</b><div class="metric">${readiness(s.id)}%</div><div class="bar"><span style="width:${readiness(s.id)}%"></span></div><p class="muted">${areaQs(s.id).length} questions · ${areaSims(s.id).length} simulations · Weight: ${s.weight}</p></div>`).join('')}</div><div class="card warn"><h2>v7.4 Test Bank</h2><p>Each AUD area has 200 section-specific practice questions. Use Quiz or Exam Mode to choose sample size before starting. Each AUD area also includes 10 CPA-style task-based simulations with quick buttons for 1, 2, or 3 simulations.</p></div><div class="card"><h2>Adaptive Recommendation</h2><p>${recommend()}</p></div>`}
function recommend(){let weak=SECTIONS.map(s=>[s.id,readiness(s.id)]).sort((a,b)=>a[1]-b[1])[0];return `Focus next on ${SECTIONS.find(s=>s.id===weak[0]).name}. Try a 20–30 question sample, then review missed explanations.`}
function readings(){$('readings').innerHTML=`<div class="card"><h2>${SECTIONS.find(s=>s.id===state.section).name}</h2><p>${READINGS[state.section]}</p><h3>High-yield topics</h3>${TOPICS[state.section].map(t=>`<span class="pill">${t}</span>`).join('')}<br><br><button class="primary" onclick="bookmark('${state.section}')">Bookmark Section</button></div>`}
function bookmark(x){if(!state.bookmarks.includes(x))state.bookmarks.push(x);save();alert('Bookmarked')}
function quizSetup(){let total=areaQs().length;$('quiz').innerHTML=`<div class="card"><h2>Quiz Setup</h2><p class="muted">Selected area: <b>${SECTIONS.find(s=>s.id===state.section).name}</b>. Question bank available: <b>${total}</b>.</p><div class="actions"><label>Sample size <input id="sampleSize" type="number" min="1" max="${total}" value="${Math.min(Number(state.quizLimit||20),total)}"></label><button class="secondary" onclick="quickSize(10)">10</button><button class="secondary" onclick="quickSize(20)">20</button><button class="secondary" onclick="quickSize(30)">30</button><button class="secondary" onclick="quickSize(50)">50</button><button class="secondary" onclick="quickSize(${total})">All ${total}</button><button class="primary" onclick="startQuiz()">Start Quiz</button></div><p class="muted">Each start creates a new shuffled sample from this area only.</p></div><div id="quizRun"></div>`}
function quickSize(n){$('sampleSize').value=n;state.quizLimit=n;save()}
function startQuiz(){let total=areaQs().length;let n=Math.max(1,Math.min(total,Number($('sampleSize').value||20)));state.quizLimit=n;state.quizSeed[state.section]=Date.now();state.currentQuiz[state.section]=shuffleWithSeed(areaQs(),state.quizSeed[state.section]).slice(0,n).map(q=>q.id);save();renderQuizRun()}
function renderQuizRun(){let ids=state.currentQuiz[state.section]||[];if(!ids.length){quizSetup();return}let qs=ids.map(id=>QUESTIONS.find(q=>q.id===id)).filter(Boolean);$('quizRun').innerHTML=`<div class="card"><h2>Quiz: ${qs.length} Questions</h2><div class="actions"><button class="secondary" onclick="quizSetup()">Change sample size</button><button class="primary" onclick="startQuiz()">New shuffled sample</button></div></div>${qs.map((q,i)=>`<div class="card"><b>Question ${i+1} of ${qs.length} · ${q.topic} · ${q.difficulty}</b><p>${q.q}</p>${q.choices.map((c,j)=>`<button type="button" class="option" onclick="answer('${q.id}','${'ABCD'[j]}',this)">${'ABCD'[j]}. ${c}</button>`).join('')}<div id="exp-${q.id}"></div></div>`).join('')}`}
function answer(id,a,btn){let q=QUESTIONS.find(x=>x.id===id);let ok=a===q.ans;state.scores[id]={correct:ok,date:Date.now(),section:q.sec};[...btn.parentNode.querySelectorAll('.option')].forEach((b,i)=>{b.disabled=true;if('ABCD'[i]===q.ans)b.classList.add('correct');else if(b===btn)b.classList.add('wrong')});$(`exp-${id}`).innerHTML=`<p><b>${ok?'Correct':'Review this'}.</b> ${q.exp}</p>`;save()}
function cards(){let fs=FLASH.filter(f=>f.sec===state.section);$('flashcards').innerHTML=`<div class="card"><h2>Flashcards</h2>${fs.map(f=>`<div class="card"><h3>${f.front}</h3><p>${f.back}</p><button class="secondary" onclick="markFlash('${f.id}','learning')">Learning</button> <button class="primary" onclick="markFlash('${f.id}','mastered')">Mastered</button> <span class="pill">${state.flash[f.id]||'new'}</span></div>`).join('')}</div>`}
function markFlash(id,val){state.flash[id]=val;save();cards()}
function sims(){let total=areaSims().length;let selected=state.currentSims[state.section]||[];$('sims').innerHTML=`<div class="card"><h2>Simulation Setup</h2><p class="muted">Selected area: <b>${SECTIONS.find(s=>s.id===state.section).name}</b>. Simulation bank available: <b>${total}</b>. These are CPA-style task-based simulations with exhibits, document-review prompts, and self-check rubrics.</p><div class="actions"><button class="secondary" onclick="quickSimSize(1)">1 Simulation</button><button class="secondary" onclick="quickSimSize(2)">2 Simulations</button><button class="secondary" onclick="quickSimSize(3)">3 Simulations</button><label>Custom <input id="simSampleSize" type="number" min="1" max="${total}" value="${Math.min(Number(state.simLimit||1),total)}"></label><button class="primary" onclick="startSims()">Start Simulations</button><button class="secondary" onclick="startSims(true)">New shuffled set</button></div><p class="muted">Recommended CPA-style practice: pair a 30–50 MCQ quiz with 1–3 simulations from the same AUD area.</p></div><div id="simRun"></div>`;if(selected.length)renderSimRun()}
function quickSimSize(n){$('simSampleSize').value=n;state.simLimit=n;save()}
function startSims(forceNew=false){let total=areaSims().length;let input=$('simSampleSize');let n=Math.max(1,Math.min(total,Number(input?input.value:state.simLimit)||1));state.simLimit=n;state.simSeed[state.section]=Date.now();state.currentSims[state.section]=shuffleWithSeed(areaSims(),state.simSeed[state.section]).slice(0,n).map(s=>s.id);save();renderSimRun()}
function renderSimRun(){let ids=state.currentSims[state.section]||[];let simsForArea=ids.map(id=>areaSims().find(s=>s.id===id)).filter(Boolean);$('simRun').innerHTML=`${simsForArea.map((s,i)=>`<div class="card"><h2>Simulation ${i+1} of ${simsForArea.length}: ${s.title}</h2><span class="pill">${s.type}</span><h3>Exhibits</h3>${s.exhibits.map(e=>`<span class="pill">${e}</span>`).join('')}<p><b>CPA-style task:</b> ${s.prompt}</p><h3>Required responses</h3><ol>${s.tasks.map(t=>`<li>${t}</li>`).join('')}</ol><textarea id="simtxt-${s.id}">${state.sim[state.section]?.[s.id]?.text||''}</textarea><h3>Self-check rubric</h3>${s.rubric.map((r,j)=>`<label><input type="checkbox" id="${s.id}-r${j}"> ${r}</label><br>`).join('')}<br><button class="primary" onclick="saveSim('${s.id}')">Save This Simulation</button></div>`).join('')}`}
function saveSim(id){let sim=areaSims().find(s=>s.id===id);let checked=sim.rubric.reduce((a,_,i)=>a+($(id+'-r'+i).checked?1:0),0);let score=Math.round(checked/sim.rubric.length*100);state.sim[state.section]=state.sim[state.section]||{};state.sim[state.section][id]={text:$('simtxt-'+id).value,score,date:Date.now()};save();alert('Simulation saved. Self-check score: '+score+'%')}
function planner(){$('planner').innerHTML=`<div class="card"><h2>Adaptive Study Planner</h2><p>${recommend()}</p><button class="primary" onclick="makePlan()">Generate 7-Day Plan</button><div id="plan"></div></div>`;if(state.plan.html)$('plan').innerHTML=state.plan.html}
function makePlan(){let weak=SECTIONS.map(s=>[s.id,readiness(s.id)]).sort((a,b)=>a[1]-b[1]);let html='<table><tr><th>Day</th><th>Assignment</th></tr>'+[1,2,3,4,5,6,7].map((d,i)=>{let sec=weak[i%4][0];return `<tr><td>Day ${d}</td><td>${SECTIONS.find(s=>s.id===sec).name}: Read 20 min, ${i<4?'30':'20'} MCQs, flashcards, and ${i%2?'review missed questions':'one simulation'}.</td></tr>`}).join('')+'</table>';state.plan.html=html;save();$('plan').innerHTML=html}
function exam(){$('exam').innerHTML=`<div class="card"><h2>Exam Mode</h2><p class="muted">Choose an AUD area, then select MCQ sample size or open the simulation bank. Each area contains 200 MCQs and 10 CPA-style simulations.</p><div class="grid2">${SECTIONS.map(s=>`<div class="card"><h3>${s.name}</h3><p>${areaQs(s.id).length} questions and ${areaSims(s.id).length} simulations available.</p><button class="primary" onclick="state.section='${s.id}';save();setView('quiz')">Start MCQs</button> <button class="secondary" onclick="state.section='${s.id}';save();setView('sims')">Start Simulations</button></div>`).join('')}</div></div>`}
function notes(){let missed=Object.entries(state.scores).filter(([id,s])=>!s.correct).map(([id])=>QUESTIONS.find(q=>q.id===id)).filter(Boolean);$('notes').innerHTML=`<div class="card"><h2>Mistake Log & Notes</h2><p class="muted">Missed questions: ${missed.length}</p>${missed.slice(-30).reverse().map(q=>`<div class="card"><b>${q.id} · ${q.topic}</b><p>${q.q}</p><p>${q.exp}</p></div>`).join('')}<textarea id="notebox">${state.notes}</textarea><br><button class="primary" onclick="state.notes=$('notebox').value;save();alert('Saved')">Save Notes</button></div><div class="card"><h2>Bookmarks</h2>${state.bookmarks.map(b=>`<span class="pill">${b}</span>`).join('')||'<p class="muted">No bookmarks yet.</p>'}</div>`}
function exportProgress(){let blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='aud-v74-progress.json';a.click()}
function toggleDark(){document.body.classList.toggle('dark');localStorage.dark=document.body.classList.contains('dark')?'1':'0'}
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(console.error));}
if(localStorage.dark==='1')document.body.classList.add('dark');renderNav();renderSectionBtns();setView('dashboard');
</script>
