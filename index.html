<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#111827" />
<title>CPA AUD Study App v7</title>
<link rel="manifest" href="manifest.json">
<style>
:root{--bg:#f7f7fb;--card:#fff;--ink:#111827;--muted:#6b7280;--line:#e5e7eb;--accent:#2563eb;--good:#059669;--warn:#d97706;--bad:#dc2626;--chip:#eff6ff}body.dark{--bg:#0b1220;--card:#111827;--ink:#f9fafb;--muted:#9ca3af;--line:#374151;--accent:#60a5fa;--chip:#172554}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif}.app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}.side{background:var(--card);border-right:1px solid var(--line);padding:22px;position:sticky;top:0;height:100vh;overflow:auto}.brand{font-size:24px;font-weight:800;margin-bottom:4px}.ver{color:var(--muted);font-size:13px;margin-bottom:20px}.nav button,.sectionBtn{width:100%;text-align:left;border:1px solid var(--line);background:transparent;color:var(--ink);border-radius:14px;padding:14px;margin:6px 0;font-size:16px}.nav button.active,.sectionBtn.active{background:var(--chip);border-color:var(--accent)}main{padding:28px;max-width:1200px}.top{display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;margin:16px 0;box-shadow:0 1px 2px #0001}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.metric{font-size:30px;font-weight:800}.muted{color:var(--muted)}button.primary{background:var(--accent);color:white;border:0;border-radius:14px;padding:13px 16px;font-size:16px}button.secondary{background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:14px;padding:12px 14px;font-size:15px}select,input,textarea{background:var(--card);color:var(--ink);border:1px solid var(--line);border-radius:12px;padding:12px;font-size:16px}textarea{width:100%;min-height:180px}.pill{display:inline-block;padding:6px 10px;border-radius:999px;background:var(--chip);margin:4px;font-size:13px}.option{display:block;width:100%;text-align:left;border:1px solid var(--line);border-radius:14px;padding:14px;margin:10px 0;background:var(--card);color:var(--ink);font-size:16px}.option.correct{border-color:var(--good);background:rgba(5,150,105,.12)}.option.wrong{border-color:var(--bad);background:rgba(220,38,38,.12)}.hide{display:none}.bar{height:10px;background:var(--line);border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:var(--accent);width:0}table{width:100%;border-collapse:collapse}th,td{border-bottom:1px solid var(--line);padding:10px;text-align:left}@media(max-width:850px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.grid,.grid2{grid-template-columns:1fr}main{padding:16px}.nav{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.nav button{margin:0}}
</style>
</head>
<body>
<div class="app">
<aside class="side">
 <div class="brand">CPA AUD</div><div class="ver">Version 7 · iPad PWA</div>
 <div class="nav" id="nav"></div>
 <div class="card"><b>Current AUD Area</b><div id="sectionBtns"></div></div>
 <button class="secondary" onclick="toggleDark()">Toggle Dark Mode</button>
 <button class="secondary" onclick="exportProgress()" style="margin-top:8px;width:100%">Export Progress</button>
</aside>
<main>
 <div class="top"><h1 id="title">Dashboard</h1><div><span class="pill" id="today"></span><span class="pill" id="activeArea"></span></div></div>
 <section id="dashboard" class="view"></section>
 <section id="readings" class="view hide"></section>
 <section id="quiz" class="view hide"></section>
 <section id="flashcards" class="view hide"></section>
 <section id="sims" class="view hide"></section>
 <section id="planner" class="view hide"></section>
 <section id="exam" class="view hide"></section>
 <section id="notes" class="view hide"></section>
</main>
</div>
<script>
const SECTIONS=[
 {id:'ethics',name:'Area I: Ethics & General Principles',weight:'15–25%'},
 {id:'risk',name:'Area II: Risk Assessment & Planning',weight:'25–35%'},
 {id:'evidence',name:'Area III: Further Procedures & Evidence',weight:'30–40%'},
 {id:'reporting',name:'Area IV: Reporting',weight:'10–20%'}
];
const TOPICS={ethics:['Independence','Due care','Engagement acceptance','Professional skepticism','Quality management'],risk:['Understanding the entity','Materiality','Internal control','Fraud risk','Audit strategy'],evidence:['Substantive procedures','Tests of controls','Sampling','Estimates','Subsequent events'],reporting:['Unmodified opinions','Modified opinions','Emphasis-of-matter','SSARS/SSAEs','Governmental/single audits']};
const READINGS={
 ethics:`Ethics and general principles are the foundation of audit judgment. Focus on independence in fact and appearance, threats to objectivity, due professional care, professional skepticism, engagement acceptance, audit documentation, and quality management. On exam questions, ask: is the auditor independent, competent, objective, and appropriately skeptical?`,
 risk:`Risk assessment drives the audit plan. The auditor obtains an understanding of the entity, its environment, applicable financial reporting framework, internal control, fraud risks, and significant accounts/disclosures. Materiality, performance materiality, and tolerable misstatement guide the nature, timing, and extent of procedures.`,
 evidence:`Audit evidence must be sufficient and appropriate. Sufficiency is quantity; appropriateness is relevance and reliability. Evidence from independent external sources is generally more reliable than internal evidence. Recalculation and reperformance are strong procedures; inquiry alone is weak. Match the assertion to the procedure.`,
 reporting:`Reporting requires knowing when opinions are unmodified, qualified, adverse, or disclaimers. Distinguish GAAP departures from scope limitations. Understand emphasis-of-matter and other-matter paragraphs, review/compilation report language, attestation reports, and governmental/single audit reporting requirements.`
};
const QUESTIONS=[]; const baseQs={
 ethics:[['Which situation most directly impairs independence?','Owning shares of the audit client','Using a specialist','Increasing sample size','Documenting planning','A','Direct financial interest in an audit client impairs independence.'],['Professional skepticism primarily requires the auditor to:','Assume management is dishonest','Maintain a questioning mind','Avoid all estimates','Rely only on inquiry','B','Professional skepticism is a questioning mind and critical assessment of evidence.'],['Engagement acceptance should occur:','Only after fieldwork','Before agreeing to perform the audit','After the report date','Only for public companies','B','Acceptance/continuance is evaluated before accepting or continuing the engagement.'],['Due professional care includes:','Absolute assurance','Reasonable care and competence','Guaranteeing fraud detection','Ignoring contradictory evidence','B','Due care requires reasonable care, competence, and diligence.']],
 risk:[['Performance materiality is used to:','Reduce likelihood aggregate misstatements exceed materiality','Eliminate audit risk','Set tax rates','Select the audit report date','A','Performance materiality helps reduce aggregation risk.'],['A walkthrough is useful to:','Understand transaction flow and controls','Confirm bank balances','Issue the audit report','Calculate EPS','A','Walkthroughs trace transactions through the system to understand controls.'],['Fraud risk is presumed for:','Revenue recognition','Cash only','Inventory only','Depreciation only','A','Auditing standards presume fraud risk related to revenue recognition unless rebutted.'],['The audit strategy is most affected by:','Assessed risks and materiality','Prior year tax return only','Board member birthdays','Logo design','A','Strategy is based on risk assessment, materiality, scope, timing, and resources.']],
 evidence:[['Most reliable evidence generally comes from:','Independent external sources','Client oral statements','Unnumbered memos','Draft budgets only','A','External independent evidence is usually more reliable.'],['Recalculation tests primarily address:','Mathematical accuracy','Existence of customers','Management integrity','Board independence','A','Recalculation checks mathematical accuracy.'],['Inquiry alone is usually:','Insufficient for significant assertions','Always conclusive','Better than confirmation','A substitute for inspection','A','Inquiry usually needs corroboration.'],['A negative confirmation is best when:','Risk is low and recipients likely respond to exceptions','Risk is high','Accounts are disputed','Controls are ineffective','A','Negative confirmations are less persuasive and used in low-risk settings.']],
 reporting:[['A material GAAP departure that is not pervasive results in:','Qualified opinion','Adverse opinion','Disclaimer','Unmodified only','A','Material but not pervasive GAAP departure generally leads to qualified opinion.'],['A pervasive scope limitation generally results in:','Disclaimer of opinion','Adverse opinion','Qualified opinion only','Compilation report','A','Pervasive scope limitation can lead to disclaimer.'],['An emphasis-of-matter paragraph is used to:','Highlight appropriately presented matter','Correct a GAAP departure','Replace the opinion','Avoid audit evidence','A','EOM highlights a properly presented/disclosed matter.'],['A review engagement provides:','Limited assurance','Reasonable assurance','Absolute assurance','No report','A','Reviews provide limited assurance.']]
};
Object.entries(baseQs).forEach(([sec,qs])=>qs.forEach((q,i)=>QUESTIONS.push({id:`${sec}-${i+1}`,sec,topic:TOPICS[sec][i%TOPICS[sec].length],difficulty:['Easy','Moderate','Difficult'][i%3],q:q[0],choices:q.slice(1,5),ans:q[5],exp:q[6],why:{A:'Review the assertion and evidence strength.',B:'Consider whether this addresses the audit objective.',C:'This may be unrelated or too extreme.',D:'This is usually a distractor.'}})));
const FLASH=[]; SECTIONS.forEach(s=>TOPICS[s.id].forEach((t,i)=>FLASH.push({id:`f-${s.id}-${i}`,sec:s.id,front:t,back:`AUD focus: know how ${t.toLowerCase()} affects planning, evidence, documentation, and reporting decisions.`})));
const SIMS={
 ethics:{title:'Independence Threat Memo',exhibits:['Client offers bookkeeping services request','Partner owns small indirect mutual fund interest','Management asks auditor to draft financial statements'],prompt:'Identify independence threats, safeguards if any, and whether the engagement may proceed.',rubric:['Identifies self-review threat','Distinguishes direct vs indirect financial interest','Explains management responsibility','Concludes clearly']},
 risk:{title:'Planning Risk Matrix',exhibits:['Revenue grew 35% near year-end','New billing system implemented','CFO bonus tied to EBITDA'],prompt:'Identify significant risks and design planning responses.',rubric:['Recognizes revenue fraud risk','Addresses IT/change risk','Links risks to assertions','Suggests responsive procedures']},
 evidence:{title:'Evidence Matching Workpaper',exhibits:['AR aging','Inventory count sheets','Legal letter','Bank confirmation'],prompt:'Match evidence to assertions and evaluate reliability.',rubric:['Links confirmations to existence/rights','Links aging to valuation','Ranks evidence reliability','Notes inquiry limitations']},
 reporting:{title:'Opinion Modification Case',exhibits:['Client refuses inventory observation','Inventory is material and pervasive','Alternative procedures unavailable'],prompt:'Determine report effect and explain opinion type.',rubric:['Identifies scope limitation','Evaluates material/pervasive','Selects disclaimer','Explains basis paragraph']}
};
let state=JSON.parse(localStorage.audv7||'{}'); state.section??='ethics'; state.scores??={}; state.flash??={}; state.notes??=''; state.sim??={}; state.bookmarks??=[]; state.surgent??={}; state.plan??={};
function save(){localStorage.audv7=JSON.stringify(state);renderDashboard()}
function $(id){return document.getElementById(id)}
function setView(v){document.querySelectorAll('.view').forEach(x=>x.classList.add('hide'));$(v).classList.remove('hide');$('title').textContent=v[0].toUpperCase()+v.slice(1);document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.v==v));render(v)}
function setSection(id){state.section=id;save();renderSectionBtns();render(document.querySelector('.view:not(.hide)').id)}
function renderNav(){['dashboard','readings','quiz','flashcards','sims','planner','exam','notes'].forEach(v=>{let b=document.createElement('button');b.textContent=v.replace('sims','simulations').replace(/^./,c=>c.toUpperCase());b.dataset.v=v;b.onclick=()=>setView(v);$('nav').appendChild(b)})}
function renderSectionBtns(){$('sectionBtns').innerHTML='';SECTIONS.forEach(s=>{let b=document.createElement('button');b.className='sectionBtn '+(state.section==s.id?'active':'');b.textContent=s.name.split(': ')[1];b.onclick=()=>setSection(s.id);$('sectionBtns').appendChild(b)});$('activeArea').textContent=SECTIONS.find(s=>s.id==state.section).weight}
function readiness(sec){let qs=QUESTIONS.filter(q=>q.sec==sec), done=qs.filter(q=>state.scores[q.id]); let pct=done.length?Math.round(done.reduce((a,q)=>a+(state.scores[q.id].correct?1:0),0)/done.length*100):0; let fl=FLASH.filter(f=>f.sec==sec); let mastered=fl.filter(f=>state.flash[f.id]=='mastered').length; return Math.round(pct*.65+(mastered/fl.length*100)*.2+(state.sim[sec]?.score||0)*.15)}
function renderDashboard(){$('today').textContent=new Date().toLocaleDateString();$('dashboard').innerHTML=`<div class="grid">${SECTIONS.map(s=>`<div class="card"><b>${s.name}</b><div class="metric">${readiness(s.id)}%</div><div class="bar"><span style="width:${readiness(s.id)}%"></span></div><p class="muted">Weight: ${s.weight}</p></div>`).join('')}</div><div class="card"><h2>Adaptive Recommendation</h2><p>${recommend()}</p></div><div class="card"><h2>Version 7 Improvements</h2><span class="pill">Expanded question framework</span><span class="pill">Detailed explanations</span><span class="pill">More simulations</span><span class="pill">Adaptive planner</span><span class="pill">Exam-day mode</span></div>`}
function recommend(){let weakest=SECTIONS.map(s=>[s.id,readiness(s.id)]).sort((a,b)=>a[1]-b[1])[0];return `Focus next on ${SECTIONS.find(s=>s.id==weakest[0]).name}. Complete 12–20 MCQs, one simulation, and flashcards for weak topics. Current estimated readiness: ${weakest[1]}% in this area.`}
function render(v){renderSectionBtns(); if(v=='dashboard')return renderDashboard(); if(v=='readings')return readings(); if(v=='quiz')return quiz(); if(v=='flashcards')return cards(); if(v=='sims')return sims(); if(v=='planner')return planner(); if(v=='exam')return exam(); if(v=='notes')return notes();}
function readings(){$('readings').innerHTML=`<div class="card"><h2>${SECTIONS.find(s=>s.id==state.section).name}</h2><p>${READINGS[state.section]}</p><h3>High-yield topics</h3>${TOPICS[state.section].map(t=>`<span class="pill">${t}</span>`).join('')}<br><br><button class="primary" onclick="bookmark('${state.section}')">Bookmark Section</button></div>`}
function bookmark(x){if(!state.bookmarks.includes(x))state.bookmarks.push(x);save();alert('Bookmarked')}
function quiz(){let qs=QUESTIONS.filter(q=>q.sec==state.section);$('quiz').innerHTML=`<div class="card"><h2>Adaptive Quiz</h2><p class="muted">Questions emphasize your selected AUD area. Each answer includes a detailed explanation.</p>${qs.map(q=>`<div class="card"><b>${q.topic} · ${q.difficulty}</b><p>${q.q}</p>${q.choices.map((c,i)=>`<button class="option" onclick="answer('${q.id}','${'ABCD'[i]}',this)">${'ABCD'[i]}. ${c}</button>`).join('')}<div id="exp-${q.id}"></div></div>`).join('')}</div>`}
function answer(id,a,btn){let q=QUESTIONS.find(x=>x.id==id); let ok=a==q.ans; state.scores[id]={correct:ok,date:Date.now()}; [...btn.parentNode.querySelectorAll('.option')].forEach((b,i)=>{b.disabled=true;if('ABCD'[i]==q.ans)b.classList.add('correct'); else if(b==btn)b.classList.add('wrong')}); $(`exp-${id}`).innerHTML=`<p><b>${ok?'Correct':'Review this'}.</b> ${q.exp}</p><p class="muted">Why distractors fail: options that do not directly address the audit objective, evidence reliability, assertion, or reporting condition are less likely to be correct.</p>`; save()}
function cards(){let fs=FLASH.filter(f=>f.sec==state.section);$('flashcards').innerHTML=`<div class="card"><h2>Flashcards</h2>${fs.map(f=>`<div class="card"><h3>${f.front}</h3><p>${f.back}</p><button class="secondary" onclick="markFlash('${f.id}','learning')">Learning</button> <button class="primary" onclick="markFlash('${f.id}','mastered')">Mastered</button> <span class="pill">${state.flash[f.id]||'new'}</span></div>`).join('')}</div>`}
function markFlash(id,val){state.flash[id]=val;save();cards()}
function sims(){let s=SIMS[state.section];$('sims').innerHTML=`<div class="card"><h2>${s.title}</h2><h3>Exhibits</h3>${s.exhibits.map(e=>`<span class="pill">${e}</span>`).join('')}<p><b>Task:</b> ${s.prompt}</p><textarea id="simtxt">${state.sim[state.section]?.text||''}</textarea><h3>Self-check rubric</h3>${s.rubric.map((r,i)=>`<label><input type="checkbox" id="r${i}"> ${r}</label><br>`).join('')}<br><button class="primary" onclick="saveSim()">Save Simulation</button></div>`}
function saveSim(){let score=[0,1,2,3].reduce((a,i)=>a+($('r'+i).checked?25:0),0);state.sim[state.section]={text:$('simtxt').value,score};save();alert('Simulation saved. Self-check score: '+score+'%')}
function planner(){$('planner').innerHTML=`<div class="card"><h2>Adaptive Study Planner</h2><p>${recommend()}</p><button class="primary" onclick="makePlan()">Generate 7-Day Plan</button><div id="plan"></div></div>`; if(state.plan.html)$('plan').innerHTML=state.plan.html}
function makePlan(){let weak=SECTIONS.map(s=>[s.id,readiness(s.id)]).sort((a,b)=>a[1]-b[1]);let html='<table><tr><th>Day</th><th>Assignment</th></tr>'+[1,2,3,4,5,6,7].map((d,i)=>{let sec=weak[i%4][0];return `<tr><td>Day ${d}</td><td>${SECTIONS.find(s=>s.id==sec).name}: Read 20 min, 15 MCQs, flashcards, and ${i%2?'review mistake log':'one simulation'}.</td></tr>`}).join('')+'</table>';state.plan.html=html;save();$('plan').innerHTML=html}
function exam(){let sample=QUESTIONS.slice().sort(()=>Math.random()-.5).slice(0,12);$('exam').innerHTML=`<div class="card"><h2>Exam-Day Mode</h2><p class="muted">Mini testlet mode with mixed areas. Use this for timed practice and endurance.</p><button class="primary" onclick="quiz()">Start by Area</button><h3>Recommended testlet structure</h3><ol><li>MCQ Testlet 1</li><li>MCQ Testlet 2</li><li>Task-based simulations</li><li>Break</li><li>Final simulations</li></ol><p>Flag hard questions, move on, and review only after completing the testlet.</p></div>`}
function notes(){$('notes').innerHTML=`<div class="card"><h2>Mistake Log & Notes</h2><textarea id="notebox">${state.notes}</textarea><br><button class="primary" onclick="state.notes=$('notebox').value;save();alert('Saved')">Save Notes</button></div><div class="card"><h2>Bookmarks</h2>${state.bookmarks.map(b=>`<span class="pill">${b}</span>`).join('')||'<p class="muted">No bookmarks yet.</p>'}</div>`}
function exportProgress(){let blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='aud-v7-progress.json';a.click()}
function toggleDark(){document.body.classList.toggle('dark');localStorage.dark=document.body.classList.contains('dark')?'1':'0'}
if(localStorage.dark=='1')document.body.classList.add('dark');renderNav();renderSectionBtns();setView('dashboard');
</script>
</body>
</html>
