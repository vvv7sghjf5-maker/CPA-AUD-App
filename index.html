<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CPA AUD Study System v8.0</title>
  <link rel="manifest" href="./manifest.json">
  <style>
    :root{
      --navy:#0B3C5D;
      --navy-2:#062B43;
      --teal:#328CC1;
      --teal-2:#1E88B9;
      --gold:#D9B310;
      --bg:#F4F7FA;
      --surface:#FFFFFF;
      --surface-2:#EEF4F8;
      --text:#1F2937;
      --muted:#64748B;
      --line:#D8E2EA;
      --ok:#1B8A5A;
      --warn:#B7791F;
      --bad:#C2410C;
      --shadow:0 12px 32px rgba(11,60,93,.10);
      --radius:18px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:linear-gradient(180deg,#EDF5FA 0%,var(--bg) 260px);color:var(--text);line-height:1.45}
    header{background:linear-gradient(135deg,var(--navy) 0%,#0E527D 58%,var(--teal) 100%);color:#fff;padding:22px 16px 18px;box-shadow:var(--shadow);position:sticky;top:0;z-index:2}
    .header-wrap{max-width:1180px;margin:auto;display:flex;justify-content:space-between;gap:16px;align-items:flex-end;flex-wrap:wrap}
    h1{margin:0;font-size:1.45rem;letter-spacing:.2px}.subtitle{opacity:.88;font-size:.92rem;margin-top:4px}.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);padding:7px 10px;border-radius:999px;font-size:.86rem}
    main{padding:18px;max-width:1180px;margin:auto}.muted{color:var(--muted)}
    .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin:14px 0;box-shadow:0 6px 20px rgba(15,23,42,.05)}
    .hero{background:linear-gradient(135deg,#FFFFFF 0%,#EEF7FC 100%);border-left:6px solid var(--gold)}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px}.actions{display:flex;gap:9px;flex-wrap:wrap;margin:12px 0;align-items:center}
    button,input,textarea,select{font:inherit;border-radius:12px;border:1px solid #C9D6E2;padding:10px 12px;background:#fff;color:var(--text)}
    input,textarea,select{box-shadow:inset 0 1px 2px rgba(15,23,42,.04)}button{cursor:pointer;background:#fff;transition:.15s ease;border-color:#BDD0DF}button:hover{transform:translateY(-1px);box-shadow:0 5px 12px rgba(11,60,93,.10)}
    .primary{background:var(--navy);border-color:var(--navy);color:#fff}.ok{background:var(--ok);border-color:var(--ok);color:#fff}.warn{background:var(--warn);border-color:var(--warn);color:#fff}.danger{background:var(--bad);border-color:var(--bad);color:#fff}
    #sections{display:grid;grid-template-columns:repeat(auto-fit,minmax(245px,1fr));gap:12px;margin-top:4px}
    #sections button{min-height:84px;text-align:left;border-left:6px solid var(--teal);background:#fff;font-weight:700;white-space:normal;line-height:1.25}
    #sections button .area-title{display:block;font-size:1rem;color:var(--navy)}#sections button .area-name{display:block;font-size:.88rem;color:var(--muted);font-weight:600;margin-top:4px}
    #sections button.active{outline:3px solid rgba(50,140,193,.32);border-color:var(--teal);background:#F1F9FD}
    nav.actions{background:#fff;border:1px solid var(--line);border-radius:16px;padding:10px;box-shadow:0 4px 16px rgba(15,23,42,.04)}nav button.active{background:var(--navy);border-color:var(--navy);color:#fff}
    .pill{display:inline-block;background:#EEF6FB;border:1px solid #C9DCEB;color:var(--navy);border-radius:999px;padding:4px 9px;margin:3px;font-size:.86rem;font-weight:600}.hide{display:none}
    .choice{display:block;width:100%;text-align:left;margin:8px 0;background:#fff}.correct{border-color:var(--ok);background:#EFFAF4}.wrong{border-color:var(--bad);background:#FFF4ED}
    .bar{height:10px;background:#E4ECF2;border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:linear-gradient(90deg,var(--teal),var(--gold))}.metric{font-size:2rem;font-weight:800;color:var(--navy)}
    textarea{width:100%;min-height:110px}table{width:100%;border-collapse:collapse;background:#fff}td,th{border-bottom:1px solid var(--line);padding:9px;text-align:left;vertical-align:top}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.day{min-height:105px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:8px}.small{font-size:.85rem}.examItem{border:1px solid var(--line);border-radius:14px;padding:14px;margin:10px 0;background:#fff}
    h2,h3,h4{color:var(--navy)}pre{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:#F8FAFC;border:1px solid var(--line);border-radius:12px;padding:12px;overflow:auto}
    @media (max-width:720px){main{padding:12px}.calendar{grid-template-columns:repeat(2,1fr)}#sections{grid-template-columns:1fr}.metric{font-size:1.55rem}}
  </style>
</head>
<body>
  <header>
    <div class="header-wrap">
      <div><h1>CPA AUD Study System</h1><div class="subtitle">Version 8.0 · Production-polish candidate · personal CPA review platform</div></div>
      <div class="badge">AUD · Exam Mode · Calendar · Progress Tracking</div>
    </div>
  </header>
  <main>
    <div class="actions" id="sections"></div>
    <nav class="actions" id="nav"></nav>
    <section id="app"></section>
  </main>
  <script src="./script.js"></script>
</body>
</html>
